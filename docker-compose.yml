services:
  postgres:
    image: postgres:16
    container_name: ka-ai-receptionist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ka_ai_receptionist
      POSTGRES_USER: ka_user
      POSTGRES_PASSWORD: ka_password
    ports:
      - "5432:5432"
    volumes:
      - ka_ai_receptionist_pgdata:/var/lib/postgresql/data

volumes:
  ka_ai_receptionist_pgdata:
